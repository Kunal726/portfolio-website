name: Deploy to GitHub Pages

on:
  # Auto-trigger on every push to the main branch
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions required for the GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one Pages deployment at a time; newer pushes cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Compute base path
        id: base
        run: |
          REPO="${GITHUB_REPOSITORY#*/}"
          if [[ "$REPO" == *.github.io ]]; then
            # User/org site (served from the domain root)
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            # Project site (served from /<repo>/)
            echo "base=/$REPO/" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          BASE_PATH: ${{ steps.base.outputs.base }}
          VITE_WEB3FORMS_ACCESS_KEY: ${{ secrets.VITE_WEB3FORMS_ACCESS_KEY || vars.VITE_WEB3FORMS_ACCESS_KEY }}

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (with GitHub Actions as the source) on first run,
          # so no manual Settings -> Pages toggle is needed.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
